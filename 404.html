<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pandora Boutique</title>
<link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon.png">
<script>
(function () {
  
  
  
  
  
  
  
  var BASE_PATH = "/";
  var path = window.location.pathname;
  
  
  var normalizedPath = path.replace(/^\/pandoraweb(\/|$)/i, "/");
  
  var m2 = normalizedPath.match(/^\/categorias\/([^\/?#]+)\/([^\/?#]+)\/?$/i);
  if (m2 && m2[1] && m2[1] !== "index.html") {
    window.location.replace(BASE_PATH + "categorias/index.html?tipo=" + encodeURIComponent(m2[1]) + "&producto=" + encodeURIComponent(m2[2]));
  } else {
    var m = normalizedPath.match(/^\/categorias\/([^\/?#]+)\/?$/i);
    if (m && m[1] && m[1] !== "index.html") {
      window.location.replace(BASE_PATH + "categorias/index.html?tipo=" + encodeURIComponent(m[1]));
    } else {
      window.location.replace(BASE_PATH);
    }
  }
})();
</script>
</head>
<body></body>
</html>
